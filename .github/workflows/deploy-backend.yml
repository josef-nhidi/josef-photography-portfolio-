name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build & Deploy Backend

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml
          
      - name: Install dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader

      - name: Create SQLite storage file
        working-directory: ./backend
        run: |
          mkdir -p database
          touch database/database.sqlite

      # 🔥 هذا أهم fix
      - name: Prepare Laravel
        working-directory: ./backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:cache
          php artisan route:cache

      - name: Move public to root
        working-directory: ./backend
        run: |
          cp -r public/* .
          rm -rf public

      - name: Fix Laravel paths
        working-directory: ./backend
        run: |
          sed -i 's|../vendor/autoload.php|./vendor/autoload.php|g' index.php
          sed -i 's|../bootstrap/app.php|./bootstrap/app.php|g' index.php

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: josefGroup
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './backend'