version: '3.8'

services:
  # MariaDB Database
  db:
    image: mariadb:10.11
    container_name: josef-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-josef_photography}
      MYSQL_USER: ${DB_USERNAME:-josef_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-josef_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - josef-network

  # Laravel API Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-josef}/backend:latest
    container_name: josef-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-josef_photography}
      DB_USERNAME: ${DB_USERNAME:-josef_user}
      DB_PASSWORD: ${DB_PASSWORD:-josef_password}
    volumes:
      - app-storage:/var/www/storage/app/public
    depends_on:
      - db
    networks:
      - josef-network

  # React Frontend + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-josef}/frontend:latest
    container_name: josef-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - josef-network

volumes:
  db-data:
  app-storage:

networks:
  josef-network:
    driver: bridge
