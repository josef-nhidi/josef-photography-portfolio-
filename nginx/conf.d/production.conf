# =============================================================================
# Josef Photography — Production Nginx Configuration
# =============================================================================
# This config serves the React SPA and proxies /api + /storage to Laravel.

upstream laravel {
    server app:80;
}

server {
    listen 80;
    server_name _;

    # --- Max upload size (for high-res photography uploads) ---
    client_max_body_size 100M;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # --- Frontend (React SPA) ---
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip compression for faster delivery ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- Static asset caching (JS, CSS, images) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

# --- API proxy to Laravel (Using Direct FastCGI) ---
    location /api {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
    }

    # --- Storage proxy (Setting up bridge to PHP engine) ---
    location /storage {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
    }

    # --- Laravel Sanctum / auth cookies ---
    location /sanctum {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
    }

    # --- React SPA fallback (all other routes go to index.html) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
