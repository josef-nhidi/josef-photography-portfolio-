upstream php-fpm {
    server 127.0.0.1:9000;
    server unix:/var/run/php/php8.4-fpm.sock;
    server unix:/var/run/php/php-fpm.sock backup;
}

server {
    listen 80;
    listen [::]:80;

    # 🚀 PRIMARY ROOT AT APPLICATION ROOT (Standard Azure PHP)
    root /home/site/wwwroot;
    index index.php index.html index.htm;

    server_name api.josefnhidi.me josefgroup-d7e4ekbfcngad4dt.germanywestcentral-01.azurewebsites.net _;
    port_in_redirect off;

    # 🔥 LARAVEL ROUTING (BRIDGED THROUGH ROOT AND PUBLIC)
    location / {
        # First try to serve from /public directly if Nginx is configured that way
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Support /public/assets while root is at app root
    location /public/ {
        try_files $uri $uri/ =404;
    }

    # ⚡ PHP FPM HANDLER
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Point to the index.php at root or in public
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_intercept_errors on;
        fastcgi_read_timeout 3600;

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

