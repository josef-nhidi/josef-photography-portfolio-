upstream php-fpm {
    # Using 127.0.0.1:9000 as the primary target for Azure PHP Image stability
    server 127.0.0.1:9000;
    # Sockets as fallbacks
    server unix:/var/run/php/php8.2-fpm.sock backup;
    server unix:/var/run/php/php-fpm.sock backup;
}

server {
    listen 80;
    listen [::]:80;
    root /home/site/wwwroot;
    index index.php index.html index.htm;
    server_name api.josefnhidi.me josefgroup-d7e4ekbfcngad4dt.germanywestcentral-01.azurewebsites.net _;

    # Force Routing to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        # Direct path to index.php entry point
        fastcgi_param SCRIPT_FILENAME /home/site/wwwroot/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # CORS headers (Always send)
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'X-Stabilized' 'true' always;
    }

    error_log /home/site/wwwroot/storage/logs/nginx-error.log;
    access_log /home/site/wwwroot/storage/logs/nginx-access.log;
}
