upstream php-fpm {
    server 127.0.0.1:9000;
    # Potential Azure Unix socket paths for fallback
    server unix:/var/run/php/php8.1-fpm.sock backup;
    server unix:/var/run/php/php8.2-fpm.sock backup;
    server unix:/var/run/php/php-fpm.sock backup;
}

server {
    listen 80;
    listen [::]:80;
    root /home/site/wwwroot;
    index index.php index.html index.htm;
    server_name api.josefnhidi.me _;

    # Increase timeout for complex requests
    proxy_read_timeout 600;
    proxy_connect_timeout 600;
    proxy_send_timeout 600;

    location / {
        # Comprehensive Nginx-level CORS
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'X-Josef-Backend' 'Active' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-TOKEN' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        # Use request_filename for a more robust path mapping
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Consistent CORS headers
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'X-Josef-Status' 'PHP-Active' always;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
