upstream php-fpm {
    server 127.0.0.1:9000;
    server unix:/var/run/php/php8.2-fpm.sock backup;
    server unix:/var/run/php/php-fpm.sock backup;
}

server {
    listen 80;
    listen [::]:80;

    root /home/site/wwwroot;
    index index.php index.html index.htm;

    server_name api.josefnhidi.me josefgroup-d7e4ekbfcngad4dt.germanywestcentral-01.azurewebsites.net _;
    port_in_redirect off;

    # 🔥 CRITICAL FIX (Laravel routing)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ⚡ PHP HANDLER
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_intercept_errors on;
        fastcgi_read_timeout 3600;

        # 🌐 CORS (Always send)
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # 🚫 security
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /html/;
    }
}

