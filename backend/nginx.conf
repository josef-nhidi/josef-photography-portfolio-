upstream php-fpm {
    # Primary socket for Azure PHP 8.2 Image
    server unix:/var/run/php/php8.2-fpm.sock;
    # Fallbacks
    server unix:/var/run/php/php-fpm.sock backup;
    server 127.0.0.1:9000 backup;
}

server {
    listen 80;
    listen [::]:80;
    root /home/site/wwwroot;
    index index.php index.html index.htm;
    server_name api.josefnhidi.me _;

    # Standard Laravel Routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        # Force all PHP requests to the main root index.php
        fastcgi_param SCRIPT_FILENAME /home/site/wwwroot/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # CORS headers (Always send)
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'X-PHP-Active' 'true' always;
    }

    # Logging
    error_log /home/site/wwwroot/storage/logs/nginx-error.log;
    access_log /home/site/wwwroot/storage/logs/nginx-access.log;
}
