upstream php-fpm {
    server 127.0.0.1:9000;
    server unix:/var/run/php/php8.2-fpm.sock backup;
    server unix:/var/run/php/php-fpm.sock backup;
}

server {
    listen 80;
    listen [::]:80;

    # 🔥 IMPORTANT: point to Laravel root
    root /home/site/wwwroot;
    index index.php index.html index.htm;

    server_name api.josefnhidi.me josefgroup-d7e4ekbfcngad4dt.germanywestcentral-01.azurewebsites.net _;

    # 🚀 Laravel routing (MOST IMPORTANT PART)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ⚡ PHP HANDLER (FIXED)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;

        # 💥 CRITICAL FIX (this was your bug)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # 🚫 Security (optional but good)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # 🪵 Logs
    error_log /home/site/wwwroot/storage/logs/nginx-error.log;
    access_log /home/site/wwwroot/storage/logs/nginx-access.log;

    # 🌐 CORS (optional for API)
    add_header 'Access-Control-Allow-Origin' "$http_origin" always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
}