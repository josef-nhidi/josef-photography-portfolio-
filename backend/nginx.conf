upstream php-fpm {
    server 127.0.0.1:9000;
    server unix:/var/run/php/php8.4-fpm.sock;
    server unix:/var/run/php/php-fpm.sock backup;
}

server {
    listen 80;
    listen [::]:80;

    # 🚀 POINT TO THE PUBLIC FOLDER (Standard Laravel)
    root /home/site/wwwroot/public;
    index index.php index.html index.htm;

    server_name api.josefnhidi.me josefgroup-d7e4ekbfcngad4dt.germanywestcentral-01.azurewebsites.net _;
    port_in_redirect off;

    # 🔥 LARAVEL ROUTING (This avoids 404s)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ⚡ PHP FPM HANDLER (Fixed for Azure)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # This MUST point to the public/index.php if we are in public root
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_intercept_errors on;
        fastcgi_read_timeout 3600;

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

